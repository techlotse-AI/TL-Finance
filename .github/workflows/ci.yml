name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16.14-alpine
        env:
          POSTGRES_DB: tlfinance
          POSTGRES_USER: tlfinance
          POSTGRES_PASSWORD: tlfinance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tlfinance -d tlfinance"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://tlfinance:tlfinance@localhost:5432/tlfinance?schema=public
      AUDIT_IP_HASH_SECRET: ci-audit-secret-at-least-32-characters
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0
          cache: npm
      - run: npm install --global npm@11.16.0
      - run: node --version && npm --version
      - run: npm ci
      - run: npm run version:check
      - run: npm run dependencies:check
      - run: npm run generate
      - run: npm run migration:check
      - run: npm run api:security:check
      - run: npm run v0.4:readiness
      - run: npx prisma migrate deploy
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run test:access
      - run: npm run security:audit
      - run: npm run build
      - run: docker build .

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      issues: write
    env:
      IMAGE_NAME: techlotse/tl-finance
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0
      - id: version
        name: Validate release version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package version ${expected_tag}." >&2
            exit 1
          fi
          echo "package_version=${package_version}" >> "${GITHUB_OUTPUT}"
      - name: Build release candidate
        shell: bash
        run: |
          docker build \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.version=${{ steps.version.outputs.package_version }}" \
            --tag "${IMAGE_NAME}:release-candidate" \
            .
      - name: Scan release candidate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:release-candidate"
          format: json
          output: trivy-results.json
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          scanners: vuln
          exit-code: 0
      - id: vulnerabilities
        name: Prepare vulnerability report
        env:
          RELEASE_RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RELEASE_TAG: "${{ github.ref_name }}"
        run: node scripts/report-container-vulnerabilities.mjs trivy-results.json container-vulnerability-report
      - name: Create vulnerability issue
        if: steps.vulnerabilities.outputs.total_count != '0'
        env:
          GH_TOKEN: "${{ github.token }}"
        shell: bash
        run: |
          first_report="container-vulnerability-report/part-001.md"
          issue_url="$(gh issue create \
            --title "Container vulnerabilities detected in ${GITHUB_REF_NAME}" \
            --body-file "${first_report}")"
          for report in container-vulnerability-report/part-*.md; do
            if [ "${report}" != "${first_report}" ]; then
              gh issue comment "${issue_url}" --body-file "${report}"
            fi
          done
      - name: Block release on Critical vulnerabilities
        if: steps.vulnerabilities.outputs.critical_count != '0'
        shell: bash
        run: |
          echo "Container publishing blocked: ${{ steps.vulnerabilities.outputs.critical_count }} Critical vulnerabilities found." >&2
          exit 1
      - name: Sign in to Docker Hub
        shell: bash
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username "${{ secrets.DOCKERHUB_USER }}" --password-stdin
      - name: Push versioned and latest images
        shell: bash
        run: |
          docker tag "${IMAGE_NAME}:release-candidate" "${IMAGE_NAME}:${GITHUB_REF_NAME}"
          docker tag "${IMAGE_NAME}:release-candidate" "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${GITHUB_REF_NAME}"
          docker push "${IMAGE_NAME}:latest"
