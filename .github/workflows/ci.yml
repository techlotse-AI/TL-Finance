name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Runs on every push and pull request. This is the gate; nothing publishes
  # unless verify passes.
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16.14-alpine
        env:
          POSTGRES_DB: tlfinance
          POSTGRES_USER: tlfinance
          POSTGRES_PASSWORD: tlfinance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tlfinance -d tlfinance"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://tlfinance:tlfinance@localhost:5432/tlfinance?schema=public
      AUDIT_IP_HASH_SECRET: ci-audit-secret-at-least-32-characters
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26.4.0
          cache: npm
      - run: npm install --global npm@11.16.0
      - run: node --version && npm --version
      - run: npm ci
      - run: npm run version:check
      - run: npm run dependencies:check
      - run: npm run generate
      - run: npm run migration:check
      - run: npm run api:security:check
      - run: npm run v0.4:readiness
      - run: npx prisma migrate deploy
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run test:access
      - run: npm run security:audit
      - run: npm run build
      - run: npm run compose:check
      - run: docker build .
      - run: docker build --target migrator .

  # Single parametric publish job. It only runs on pushes (never PRs) and only
  # after verify succeeds. Tag pushes (vX.Y.Z) publish the versioned image plus
  # `latest`; main pushes publish a `nightly` image plus the commit SHA. Both
  # channels are Trivy-scanned and blocked on Critical vulnerabilities.
  publish:
    if: >-
      github.event_name == 'push' &&
      (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      issues: write
    env:
      IMAGE_NAME: techlotse/tl-finance
      MIGRATOR_IMAGE_NAME: techlotse/tl-finance-migrator
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26.4.0

      - id: meta
        name: Resolve publish channel and image tags
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            # Release: tag is the source of truth for the version.
            version="${GITHUB_REF_NAME#v}"
            case "${version}" in
              *-alpha.*) channel="prerelease"; moving="alpha" ;;
              *-beta.*)  channel="prerelease"; moving="beta" ;;
              *-rc.*)    channel="prerelease"; moving="rc" ;;
              *)         channel="release";    moving="latest" ;;
            esac
            echo "channel=${channel}" >> "${GITHUB_OUTPUT}"
            echo "version=${version}" >> "${GITHUB_OUTPUT}"
            # Versioned image + the moving channel tag: pre-releases move `:alpha`
            # (never `:latest`), stable releases move `:latest`.
            echo "tags=${GITHUB_REF_NAME} ${moving}" >> "${GITHUB_OUTPUT}"
          else
            # Nightly: built from main, never tagged `latest`.
            short_sha="${GITHUB_SHA:0:12}"
            echo "channel=nightly" >> "${GITHUB_OUTPUT}"
            echo "version=0.0.0-nightly+${short_sha}" >> "${GITHUB_OUTPUT}"
            echo "tags=nightly ${short_sha}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build candidate images
        shell: bash
        run: |
          docker build \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.version=${{ steps.meta.outputs.version }}" \
            --tag "${IMAGE_NAME}:release-candidate" \
            .
          docker build \
            --target migrator \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.version=${{ steps.meta.outputs.version }}" \
            --tag "${MIGRATOR_IMAGE_NAME}:release-candidate" \
            .

      - name: Scan application image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:release-candidate"
          format: json
          output: trivy-app-results.json
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          scanners: vuln
          trivyignores: .trivyignore
          exit-code: 0
      - name: Scan migrator image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: "${{ env.MIGRATOR_IMAGE_NAME }}:release-candidate"
          format: json
          output: trivy-migrator-results.json
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          scanners: vuln
          trivyignores: .trivyignore
          exit-code: 0
      - name: Combine container scan reports
        shell: bash
        run: |
          jq -s '{Results: [.[].Results[]]}' \
            trivy-app-results.json \
            trivy-migrator-results.json \
            > trivy-results.json
      - id: vulnerabilities
        name: Prepare vulnerability report
        env:
          RELEASE_RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RELEASE_TAG: "${{ steps.meta.outputs.channel }} ${{ steps.meta.outputs.version }}"
        run: node scripts/report-container-vulnerabilities.mjs trivy-results.json container-vulnerability-report
      # Single, deduplicated tracking issue. If vulnerabilities are present we
      # update the existing open issue in place (refresh its body, append this
      # run's overflow parts) instead of opening a new one each release; only if
      # none is open do we create one. When a scan is clean we close any open
      # tracking issue referencing the clean run.
      - name: Update or create vulnerability issue
        if: steps.vulnerabilities.outputs.total_count != '0'
        env:
          GH_TOKEN: "${{ github.token }}"
          VULN_LABEL: container-vulnerabilities
          ISSUE_TITLE: "Container image vulnerabilities"
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SCAN_TAG: "${{ steps.meta.outputs.channel }} ${{ steps.meta.outputs.version }}"
        shell: bash
        run: |
          set -euo pipefail
          gh label create "${VULN_LABEL}" --color B60205 \
            --description "Open container image CVEs from the release scan" --force
          first_report="container-vulnerability-report/part-001.md"
          existing="$(gh issue list --label "${VULN_LABEL}" --state open \
            --json number --jq '.[0].number // empty')"
          if [ -n "${existing}" ]; then
            echo "Updating existing issue #${existing} in place."
            gh issue edit "${existing}" --body-file "${first_report}"
            gh issue comment "${existing}" \
              --body "Rescanned for **${SCAN_TAG}** — vulnerabilities still present. See ${RUN_URL}."
            issue_ref="${existing}"
          else
            echo "No open issue; creating one."
            issue_ref="$(gh issue create --label "${VULN_LABEL}" \
              --title "${ISSUE_TITLE}" --body-file "${first_report}")"
          fi
          for report in container-vulnerability-report/part-*.md; do
            if [ "${report}" != "${first_report}" ]; then
              gh issue comment "${issue_ref}" --body-file "${report}"
            fi
          done
      - name: Close vulnerability issue when scan is clean
        if: steps.vulnerabilities.outputs.total_count == '0'
        env:
          GH_TOKEN: "${{ github.token }}"
          VULN_LABEL: container-vulnerabilities
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SCAN_TAG: "${{ steps.meta.outputs.channel }} ${{ steps.meta.outputs.version }}"
        shell: bash
        run: |
          set -euo pipefail
          for number in $(gh issue list --label "${VULN_LABEL}" --state open \
            --json number --jq '.[].number'); do
            echo "Closing resolved issue #${number}."
            gh issue close "${number}" \
              --comment "Resolved: the **${SCAN_TAG}** container scan found no HIGH/CRITICAL vulnerabilities. See ${RUN_URL}."
          done
      - name: Block publish on Critical vulnerabilities
        if: steps.vulnerabilities.outputs.critical_count != '0'
        shell: bash
        run: |
          echo "Container publishing blocked: ${{ steps.vulnerabilities.outputs.critical_count }} Critical vulnerabilities found." >&2
          exit 1

      - name: Sign in to Docker Hub
        shell: bash
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username "${{ secrets.DOCKERHUB_USER }}" --password-stdin
      - name: Tag and push images
        shell: bash
        run: |
          for tag in ${{ steps.meta.outputs.tags }}; do
            echo "Publishing ${IMAGE_NAME}:${tag} and ${MIGRATOR_IMAGE_NAME}:${tag}"
            docker tag "${IMAGE_NAME}:release-candidate" "${IMAGE_NAME}:${tag}"
            docker tag "${MIGRATOR_IMAGE_NAME}:release-candidate" "${MIGRATOR_IMAGE_NAME}:${tag}"
            docker push "${IMAGE_NAME}:${tag}"
            docker push "${MIGRATOR_IMAGE_NAME}:${tag}"
          done
