name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16.14-alpine
        env:
          POSTGRES_DB: tlfinance
          POSTGRES_USER: tlfinance
          POSTGRES_PASSWORD: tlfinance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tlfinance -d tlfinance"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://tlfinance:tlfinance@localhost:5432/tlfinance?schema=public
      AUDIT_IP_HASH_SECRET: ci-audit-secret-at-least-32-characters
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0
          cache: npm
      - run: npm install --global npm@11.16.0
      - run: node --version && npm --version
      - run: npm ci
      - run: npm run dependencies:check
      - run: npm run generate
      - run: npm run migration:check
      - run: npx prisma migrate deploy
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run test:access
      - run: npm run security:audit
      - run: npm run build
      - run: docker build .
