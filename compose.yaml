name: tl-finance

x-app-environment: &app-environment
  DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
  AUDIT_IP_HASH_SECRET: ${AUDIT_IP_HASH_SECRET:?Set AUDIT_IP_HASH_SECRET in .env}
  RATE_LIMIT_HASH_SECRET: ${RATE_LIMIT_HASH_SECRET:?Set RATE_LIMIT_HASH_SECRET in .env}
  NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?Set NEXT_PUBLIC_APP_URL in .env}
  INSTANCE_ADMIN_EMAIL: ${INSTANCE_ADMIN_EMAIL:-}
  EMAIL_VERIFICATION_REQUIRED: ${EMAIL_VERIFICATION_REQUIRED:-true}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_SECURE: ${SMTP_SECURE:-true}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM: ${SMTP_FROM:-}
  SCHEDULED_BACKUP_TOKEN: ${SCHEDULED_BACKUP_TOKEN:?Set SCHEDULED_BACKUP_TOKEN in .env}
  S3_BACKUP_ENDPOINT: ${S3_BACKUP_ENDPOINT:-}
  S3_BACKUP_REGION: ${S3_BACKUP_REGION:-}
  S3_BACKUP_BUCKET: ${S3_BACKUP_BUCKET:-}
  S3_BACKUP_PREFIX: ${S3_BACKUP_PREFIX:-tl-finance}
  S3_BACKUP_ACCESS_KEY_ID: ${S3_BACKUP_ACCESS_KEY_ID:-}
  S3_BACKUP_SECRET_ACCESS_KEY: ${S3_BACKUP_SECRET_ACCESS_KEY:-}
  S3_BACKUP_FORCE_PATH_STYLE: ${S3_BACKUP_FORCE_PATH_STYLE:-false}
  S3_BACKUP_SERVER_SIDE_ENCRYPTION: ${S3_BACKUP_SERVER_SIDE_ENCRYPTION:-AES256}
  S3_BACKUP_KMS_KEY_ID: ${S3_BACKUP_KMS_KEY_ID:-}

services:
  db:
    container_name: TL-Finance-Db
    image: postgres:${POSTGRES_VERSION:-16.14-alpine}
    pull_policy: always
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tlfinance}
      POSTGRES_USER: ${POSTGRES_USER:-tlfinance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - database

  migrate:
    container_name: TL-Finance-Migrate
    image: ${TL_FINANCE_MIGRATOR_IMAGE:-techlotse/tl-finance-migrator}:${TL_FINANCE_VERSION:?Set TL_FINANCE_VERSION to a published vX.Y.Z tag}
    pull_policy: always
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - database

  app:
    container_name: TL-Finance-App
    image: ${TL_FINANCE_IMAGE:-techlotse/tl-finance}:${TL_FINANCE_VERSION:?Set TL_FINANCE_VERSION to a published vX.Y.Z tag}
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    environment: *app-environment
    ports:
      - "${APP_BIND_ADDRESS:-127.0.0.1}:${APP_PORT:-3000}:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    networks:
      - application
      - database

  backup-scheduler:
    container_name: TL-Finance-Backup-Scheduler
    profiles: ["scheduled-backups"]
    image: ${TL_FINANCE_IMAGE:-techlotse/tl-finance}:${TL_FINANCE_VERSION:?Set TL_FINANCE_VERSION to a published vX.Y.Z tag}
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    healthcheck:
      disable: true
    environment:
      SCHEDULED_BACKUP_TOKEN: ${SCHEDULED_BACKUP_TOKEN:?Set SCHEDULED_BACKUP_TOKEN in .env}
    command:
      - node
      - -e
      - |
        const run = () => fetch("http://app:3000/api/system/scheduled-backup", { method: "POST", headers: { "x-tl-finance-backup-token": process.env.SCHEDULED_BACKUP_TOKEN } }).then(async r => { if (!r.ok) throw new Error(await r.text()); console.log(new Date().toISOString(), await r.text()); }).catch(e => console.error(new Date().toISOString(), e.message));
        run();
        setInterval(run, 86400000);
    depends_on:
      app:
        condition: service_healthy
    networks:
      - application

volumes:
  postgres-data:

networks:
  application:
  database:
    internal: true
